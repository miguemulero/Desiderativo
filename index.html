<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análisis Cuestionario Desiderativo</title>

  <link rel="stylesheet" href="form.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="header-title">
        <img src="icon.png" alt="Icono" class="app-icon">
        <!-- ✅ Eliminado el "📋" del título -->
        <h1>Análisis Cuestionario Desiderativo</h1>
      </div>

      <p class="subtitle">Análisis clínico integral</p>
    </header>

    <main>
      <form id="desiderativo-form">

        <section class="form-section">
          <h2>Datos del Evaluado</h2>

          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre/ID del protocolo *</label>
              <input type="text" id="nombre" name="nombre" required placeholder="Ej: Protocolo ACR">
            </div>

            <div class="form-group">
              <label for="edad">Edad *</label>
              <input type="number" id="edad" name="edad" min="4" max="100" required placeholder="Años">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="genero">Sexo</label>
              <select id="genero" name="genero">
                <option value="">Seleccionar...</option>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro</option>
                <option value="no-especifica">Prefiere no especificar</option>
              </select>
            </div>

            <div class="form-group">
              <label for="nivel_educativo">Nivel educativo</label>
              <select id="nivel_educativo" name="nivel_educativo">
                <option value="">Seleccionar...</option>
                <option value="inicial">Inicial</option>
                <option value="primario">Primario</option>
                <option value="secundario">Secundario</option>
                <option value="terciario">Terciario</option>
                <option value="universitario">Universitario</option>
                <option value="posgrado">Posgrado</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fecha">Fecha de aplicación *</label>
              <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
              <label for="modalidad">Modalidad de aplicación</label>
              <select id="modalidad" name="modalidad">
                <option value="estandar">Estándar</option>
                <option value="guiada">Guiada</option>
                <option value="modificada">Modificada</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="informacion">Información contextual relevante</label>
            <textarea id="informacion" name="informacion" rows="3" placeholder="Motivo de consulta, antecedentes, observaciones de conducta durante la aplicación..."></textarea>
          </div>
        </section>

        <div class="catexias-two-col">
          <section class="form-section">
            <h2>🟢 Catexias Positivas</h2>
            <p class="section-description">¿Qué te gustaría ser si no pudieras ser persona?</p>
            <div id="positivas-container"></div>
          </section>

          <section class="form-section">
            <h2>🔴 Catexias Negativas</h2>
            <p class="section-description">¿Qué NO te gustaría ser?</p>
            <div id="negativas-container"></div>
          </section>
        </div>

        <section class="form-section">
          <h2>Asociaciones y Recuerdo</h2>

          <div class="form-group">
            <label for="asociaciones">Asociaciones espontáneas</label>
            <textarea id="asociaciones" name="asociaciones" rows="3" placeholder="Asociaciones libres, comentarios espontáneos durante o después de la aplicación..."></textarea>
          </div>

          <div class="form-group">
            <label for="recuerdo">Recuerdo positivo</label>
            <textarea id="recuerdo" name="recuerdo" rows="2" placeholder="Recuerdo positivo solicitado al finalizar..."></textarea>
          </div>
        </section>

        <section class="form-actions">
          <button type="button" id="limpiar" class="btn btn-secondary">🗑️ Limpiar formulario</button>
          <button type="button" id="analizar" class="btn btn-primary">🤖 Analizar protocolo</button>
        </section>

        <div class="status-container">
          <div id="spinner" class="spinner" hidden></div>
          <p id="statusText" class="status-text"></p>
        </div>
      </form>

      <section id="result-section" class="result-section" style="display: none;">
        <div class="result-header">
          <h2>📊 Informe de Análisis</h2>
          <button type="button" id="guardar-imprimir" class="btn btn-success">💾 Guardar / Imprimir</button>
        </div>
        <textarea id="result-text" class="result-textarea" readonly></textarea>
      </section>
    </main>

    <footer class="app-footer" aria-hidden="true"></footer>
  </div>

  <script type="module" src="form.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('✓ Service Worker registrado'))
          .catch(err => console.log('✗ Error en Service Worker:', err));
      });
    }
  </script>
</body>
</html>
