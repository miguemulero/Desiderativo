<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análisis Cuestionario Desiderativo</title>
  <link rel="stylesheet" href="form.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2c3e50" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Desiderativo" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Análisis Cuestionario Desiderativo</h1>
      <p class="subtitle">Análisis clínico integral</p>
    </header>

    <main>
      <!-- tu formulario aquí (sin cambios funcionales) -->
      <button type="button" id="analizar">Analizar</button>
      <div id="spinner" hidden>Procesando...</div>
      <p id="statusText"></p>

      <section id="result-section" style="display:none;">
        <textarea id="result-text" readonly></textarea>
        <pre id="result-print" aria-hidden="true"></pre>
        <button type="button" id="guardar-imprimir">Guardar / Imprimir</button>
      </section>
    </main>
  </div>

  <!-- cache-bust para que NO cargue el viejo -->
  <script src="form.js?v=20260303_2"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const reg = await navigator.serviceWorker.register("sw.js");
          if (reg.update) await reg.update();
          console.log("SW registrado/actualizado");
        } catch (e) {
          console.log("SW error", e);
        }
      });
    }
  </script>
</body>
</html>
